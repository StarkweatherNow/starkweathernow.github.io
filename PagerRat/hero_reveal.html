<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>
        /* Base OBS Transparency */
        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            background-color: transparent !important;
            overflow: hidden;
        }

        /* THE ORBITAL HUBS (The Solar System Mechanics) */
        .hub, .counter-hub {
            position: absolute;
            top: 50%; left: 50%;
            width: 0; height: 0;
        }

        /* Hubs rotate to create the orbit, counter-hubs rotate backward so the stamps stay upright */
        .hub-1 { animation: orbit 45s linear 3.5s infinite both; }
        .counter-1 { animation: orbit-reverse 45s linear 3.5s infinite both; }

        .hub-2 { animation: orbit-reverse 35s linear 3.5s infinite both; }
        .counter-2 { animation: orbit 35s linear 3.5s infinite both; }

        .hub-3 { animation: orbit 60s linear 3.5s infinite both; }
        .counter-3 { animation: orbit-reverse 60s linear 3.5s infinite both; }

        @keyframes orbit {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        @keyframes orbit-reverse {
            from { transform: rotate(0deg); }
            to { transform: rotate(-360deg); }
        }

        /* BASE STAMP CLASS */
        .stamp {
            position: absolute;
            width: 50vw;
            height: 50vh;
            background-image: url('Rat_Science.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            opacity: 0; 
            filter: drop-shadow(0px 0px 15px #39ff14) drop-shadow(-5px 5px 0px rgba(255, 51, 204, 0.5));
        }

        /* THE PHYSICAL SLAM ANIMATION */
        @keyframes slam-down {
            0% { transform: scale(3) rotate(var(--start-rot)); opacity: 0; filter: brightness(2) blur(10px); }
            10% { opacity: 0.9; filter: brightness(1) blur(0px); }
            100% { transform: scale(var(--end-scale)) rotate(var(--end-rot)); opacity: 0.4; filter: grayscale(70%) blur(3px); }
        }

        /* INDIVIDUAL STAMP PLACEMENTS (Relative to the center hub) */
        .stamp-1 {
            top: -55vh; left: -45vw; /* Top Left Orbit */
            --start-rot: -45deg; --end-rot: -20deg; --end-scale: 0.6;
            animation: slam-down 2s cubic-bezier(0.1, 0.9, 0.2, 1) 0.2s forwards;
        }

        .stamp-2 {
            top: -45vh; left: 5vw; /* Top Right Orbit */
            --start-rot: 30deg; --end-rot: 15deg; --end-scale: 0.8;
            animation: slam-down 2s cubic-bezier(0.1, 0.9, 0.2, 1) 0.7s forwards;
        }

        .stamp-3 {
            top: 5vh; left: -50vw; /* Bottom Left Orbit */
            --start-rot: -20deg; --end-rot: -5deg; --end-scale: 1.1;
            animation: slam-down 2s cubic-bezier(0.1, 0.9, 0.2, 1) 1.2s forwards;
        }

        /* THE FINAL HERO IMAGE */
        .hero {
            position: absolute;
            top: 50%; left: 50%;
            width: 80vw; height: 80vh;
            background-image: url('Rat_Science.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            opacity: 0;
            z-index: 100;
        }

        /* Chaining the entrance drop with an infinite hover/breathe effect */
        .hero-active {
            animation: 
                hero-drop 3s cubic-bezier(0.1, 0.9, 0.2, 1) 1.8s forwards,
                hero-float 6s ease-in-out 4.8s infinite alternate;
        }

        @keyframes hero-drop {
            0% { transform: translate(-50%, -50%) scale(4); opacity: 0; filter: brightness(3); }
            15% { transform: translate(-50%, -50%) scale(0.95); opacity: 1; filter: brightness(1); }
            100% { 
                transform: translate(-50%, -50%) scale(1); 
                opacity: 1; 
                filter: drop-shadow(0 0 50px rgba(57, 255, 20, 0.8)) drop-shadow(0 0 20px #ff33cc); 
            }
        }

        /* The continuous floating animation */
        @keyframes hero-float {
            0% { 
                transform: translate(-50%, -50%) scale(1); 
                filter: drop-shadow(0 0 50px rgba(57, 255, 20, 0.8)) drop-shadow(0 0 20px #ff33cc); 
            }
            100% { 
                /* Drifts slightly up and scales up to simulate breathing */
                transform: translate(-50%, -52%) scale(1.02); 
                filter: drop-shadow(0 0 70px rgba(57, 255, 20, 1)) drop-shadow(0 0 30px #ff33cc); 
            }
        }

        /* THE IMPACT FLASH */
        .flash {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: #39ff14; 
            opacity: 0;
            z-index: 99;
            pointer-events: none;
        }

        @keyframes flash-fade {
            0% { opacity: 0; }
            5% { opacity: 0.8; }
            100% { opacity: 0; }
        }

        .flash-active {
            animation: flash-fade 1.5s ease-out 1.8s forwards;
        }
    </style>
</head>
<body>
    
    <div class="hub hub-1">
        <div class="counter-hub counter-1">
            <div class="stamp stamp-1"></div>
        </div>
    </div>

    <div class="hub hub-2">
        <div class="counter-hub counter-2">
            <div class="stamp stamp-2"></div>
        </div>
    </div>

    <div class="hub hub-3">
        <div class="counter-hub counter-3">
            <div class="stamp stamp-3"></div>
        </div>
    </div>
    
    <div class="flash flash-active"></div>

    <div class="hero hero-active"></div>

</body>
</html>
