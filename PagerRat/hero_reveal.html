<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>
        /* Base OBS Transparency */
        body {
            margin: 0;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            background: transparent;
        }

        /* The Flashbang Overlay */
        #flash {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: white;
            opacity: 0;
            z-index: 999;
            pointer-events: none;
        }

        /* Container for the background stamps */
        .stamp {
            position: absolute;
            background-image: url('Rat_Science.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            opacity: 0;
            /* Drop shadow gives it depth off the transparent background */
            filter: drop-shadow(0 0 15px rgba(57, 255, 20, 0.4));
            transform-origin: center;
        }

        /* The physical "slam" physics */
        .is-stamped {
            /* Uses a custom cubic-bezier to create a harsh 'thud' and slight bounce */
            animation: slam 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes slam {
            0% { transform: scale(3) rotate(var(--rot)); opacity: 0; filter: brightness(2); }
            30% { opacity: 0.8; filter: brightness(1); }
            100% { transform: scale(var(--s)) rotate(var(--rot)); opacity: 0.6; filter: grayscale(50%) blur(2px); }
        }

        /* THE FINAL HERO IMAGE */
        #hero-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            width: 85vw;
            height: 85vh;
            background-image: url('Rat_Science.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            z-index: 100;
            opacity: 0;
        }

        .hero-drop {
            animation: hero-slam 0.8s cubic-bezier(0.2, 1, 0.3, 1) forwards;
        }

        @keyframes hero-slam {
            0% { transform: translate(-50%, -50%) scale(4) rotate(-10deg); opacity: 0; filter: brightness(3); }
            40% { transform: translate(-50%, -50%) scale(0.95) rotate(2deg); opacity: 1; filter: brightness(1); }
            100% { 
                transform: translate(-50%, -50%) scale(1) rotate(0deg); 
                opacity: 1; 
                filter: drop-shadow(0 0 40px #ff33cc) drop-shadow(0 0 10px #39ff14); 
            }
        }

        /* Screen flash animation */
        .flash-bang {
            animation: flash-fade 1s ease-out forwards;
        }

        @keyframes flash-fade {
            0% { opacity: 1; }
            100% { opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="flash"></div>
    <div id="stamp-container"></div>
    <div id="hero-center"></div>

    <script>
        // The Choreography: [X position, Y position, Scale, Rotation, Delay in ms]
        const sequence = [
            { left: '10%', top: '10%', scale: 0.3, rot: '-25deg', time: 200 },
            { left: '70%', top: '15%', scale: 0.4, rot: '15deg',  time: 600 },
            { left: '15%', top: '65%', scale: 0.5, rot: '-10deg', time: 1000 },
            { left: '65%', top: '60%', scale: 0.6, rot: '20deg',  time: 1400 },
            { left: '35%', top: '35%', scale: 0.7, rot: '-5deg',  time: 1800 }
        ];

        const container = document.getElementById('stamp-container');
        const hero = document.getElementById('hero-center');
        const flash = document.getElementById('flash');

        function triggerSequence() {
            // 1. Loop through and drop the background stamps
            sequence.forEach(stampData => {
                setTimeout(() => {
                    const el = document.createElement('div');
                    el.classList.add('stamp');
                    el.style.left = stampData.left;
                    el.style.top = stampData.top;
                    // Standardize the size base, scale handles the math
                    el.style.width = '600px'; 
                    el.style.height = '600px';
                    
                    // Inject CSS variables for the keyframe animation
                    el.style.setProperty('--s', stampData.scale);
                    el.style.setProperty('--rot', stampData.rot);
                    
                    container.appendChild(el);
                    
                    // Trigger reflow to ensure animation plays
                    void el.offsetWidth;
                    el.classList.add('is-stamped');
                }, stampData.time);
            });

            // 2. Drop the main hero graphic right after the last stamp
            setTimeout(() => {
                flash.classList.add('flash-bang');
                hero.classList.add('hero-drop');
            }, 2300); // Hits 500ms after the final background stamp
        }

        // Auto-trigger when the OBS source becomes active
        window.onload = triggerSequence;
    </script>
</body>
</html>
